name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Build Electron (NSIS Installer)
        run: npx electron-builder --publish never

      - name: List dist-electron contents (debug)
        run: Get-ChildItem -Recurse dist-electron | Select-Object FullName
        shell: pwsh

      - name: Upload Installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: scoreboard-windows-installer
          path: dist-electron/**/*.exe
          retention-days: 30

      - name: Create GitHub Release with Installer
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/**/*.exe
          generate_release_notes: true
          draft: false
